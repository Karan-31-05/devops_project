# New Relic Python Configuration File

[newrelic]
# Set this to your New Relic License Key
license_key = eu01xxb335ade2350a078353c2220874FFFFNRAL

# Application name - shows up in New Relic UI
app_name = ERP-System

# Logging configuration
log_file = newrelic-agent.log
log_level = info

# Transaction tracing (capture slow queries)
transaction_tracer.enabled = true
transaction_tracer.slow_sql = true

# Error collection
error_collector.enabled = true

# Real User Monitoring (Browser monitoring) - optional
browser_monitoring.auto_instrument = true

# Database monitoring
datastore_tracer.instance_reporting.enabled = true

# Django-specific settings
wsgi_middleware.django.installed = true
